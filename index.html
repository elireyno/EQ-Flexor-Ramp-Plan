<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gusto EQ Flexors — Rotation Plan</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f0faf7;color:#0f2520;min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:16px}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
input,select,textarea{font-family:'DM Sans',sans-serif}
a{color:inherit}
:root{--teal:#0d9488;--teal-light:#f0fdfa;--teal-border:#99f6e4;--teal-dark:#0f766e;--amber:#d97706;--amber-light:#fffbeb;--red:#dc2626;--green:#16a34a;--slate:#475569;--border:#e2e8f0;}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0f766e,#0d9488,#14b8a6);border-radius:16px;padding:20px 24px;margin-bottom:14px;color:white;position:relative;overflow:hidden}
.hdr::before{content:"";position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:rgba(255,255,255,.06);border-radius:50%}
.hdr::after{content:"";position:absolute;bottom:-60px;left:20px;width:140px;height:140px;background:rgba(255,255,255,.04);border-radius:50%}
.hdr h1{font-size:20px;font-weight:800;letter-spacing:-.3px;position:relative}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.75);margin-top:4px;position:relative}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;position:relative}
.hdr-meta{display:flex;gap:10px;margin-top:8px;font-size:11px;color:rgba(255,255,255,.8);flex-wrap:wrap;align-items:center;position:relative}

/* NAV */
.nav-tabs{display:flex;gap:4px;margin-bottom:14px;background:white;padding:5px;border-radius:12px;border:1px solid var(--border);flex-wrap:wrap}
.nav-tab{flex:1;min-width:70px;padding:8px 10px;border:none;font-size:12px;font-weight:600;border-radius:8px;transition:all .2s;color:var(--slate);background:transparent;white-space:nowrap}
.nav-tab.on{background:var(--teal);color:white}

/* BARS */
.admin-bar{background:var(--amber-light);border:1px solid #fde68a;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:#92400e;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}

/* PROGRESS */
.prog-box{background:white;border:1px solid var(--teal-border);border-radius:12px;padding:14px;margin-bottom:12px}
.prog-track{background:#e2e8f0;border-radius:999px;overflow:hidden}
.prog-fill{height:100%;border-radius:999px;background:var(--teal);transition:width .4s}

/* FILTER */
.filter-row{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.fbtn{padding:3px 10px;border-radius:999px;border:1px solid var(--border);font-size:10px;font-weight:600;background:white;color:var(--slate);cursor:pointer}
.fbtn.on{border-color:var(--teal);background:var(--teal);color:white}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.sdrop{position:absolute;top:100%;left:0;right:0;z-index:50;background:white;border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:240px;overflow-y:auto;margin-top:4px;display:none}
.sdrop.show{display:block}

/* PHASE */
.phase{margin-bottom:7px;border-radius:12px;border:1px solid var(--border);overflow:visible;background:white}
.phase-head{display:flex;align-items:stretch;width:100%}
.phase-toggle{flex:1;padding:12px 14px;display:flex;align-items:center;gap:10px;background:white;border:none;text-align:left;cursor:pointer;border-radius:12px 0 0 0}
.phase-toggle.done-bg{background:#f0fdf4}
.phase-body{padding:0 14px 14px;border-top:1px solid #f1f5f9}

/* TASK */
.task{margin-bottom:4px;border-radius:8px;border:1px solid #f1f5f9;background:white;overflow:hidden}
.task.done{border-color:#bbf7d0;background:#f0fdf4}
.task-row{display:flex;align-items:flex-start;gap:8px;padding:8px 10px}
.cb{width:17px;height:17px;border-radius:4px;border:2px solid #cbd5e1;background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;cursor:pointer;transition:all .15s}
.cb.on{border-color:var(--teal);background:var(--teal)}

/* INLINE EDIT */
.ie{background:transparent;border:none;outline:none;font-family:'DM Sans',sans-serif;color:inherit;padding:0;margin:0}
.ie:focus{background:rgba(13,148,136,.07);border-radius:4px;outline:2px solid var(--teal);padding:1px 4px}
.ie-task{font-size:12px;font-weight:500;line-height:1.35;display:block;resize:none;overflow:hidden;width:100%}
.ie-task.done-txt{color:var(--teal);text-decoration:line-through;opacity:.7}
.ie-goal{font-size:11px;color:var(--slate);font-style:italic;resize:none;overflow:hidden;line-height:1.4;width:100%;margin:8px 0 10px;display:block}
.ie-phase-name{font-size:13px;font-weight:700;border:none;outline:none;background:transparent;color:inherit;font-family:'DM Sans',sans-serif;min-width:60px}
.ie-phase-name:focus{background:rgba(255,255,255,.2);border-radius:4px;outline:2px solid rgba(255,255,255,.5);padding:1px 4px}
.ie-weeks{font-size:11px;color:rgba(255,255,255,.7);border:none;outline:none;background:transparent;font-family:'DM Sans',sans-serif;min-width:40px}
.ie-weeks:focus{background:rgba(255,255,255,.15);border-radius:4px;outline:2px solid rgba(255,255,255,.4);padding:1px 4px}

/* NOTES */
.task-notes{margin-top:5px}
.notes-toggle{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:600;padding:2px 8px;border-radius:5px;border:1px dashed #cbd5e1;background:#f8fafc;color:#64748b;cursor:pointer;transition:all .15s}
.notes-toggle.has-note{border-color:#fbbf24;background:#fffbeb;color:#92400e;border-style:solid}
.notes-area{width:100%;margin-top:5px;padding:8px 10px;border-radius:7px;border:1px solid var(--border);font-size:11px;font-family:'DM Sans',sans-serif;resize:vertical;outline:none;min-height:52px;background:#fafbfc;color:#334155;line-height:1.45;box-sizing:border-box}
.notes-area:focus{border-color:#fbbf24;background:#fffdf5;box-shadow:0 0 0 3px rgba(251,191,36,.1)}

/* PILLS & TAGS */
.pill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;display:inline-block}
.res-tag{font-size:9px;padding:2px 6px;border-radius:5px;font-weight:500;display:inline-flex;align-items:center;gap:2px}
.lbtn{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600;cursor:pointer;border:1px dashed var(--teal-border);background:var(--teal-light);color:var(--teal)}

/* VIS BADGE */
.vbadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;cursor:pointer;transition:all .15s;white-space:nowrap;border:1px solid}
.v-hidden{background:#f1f5f9;color:#94a3b8;border-color:#e2e8f0}
.v-visible{background:#dcfce7;color:#16a34a;border-color:#bbf7d0}
.v-admin{background:#fef3c7;color:#92400e;border-color:#fde68a}

/* ADMIN BTNS */
.abtn-row{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.abtn{padding:2px 4px;border:none;border-radius:4px;font-size:9px;cursor:pointer}

/* MODAL */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:white;border-radius:14px;padding:24px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{margin:0 0 12px;font-size:16px;font-weight:800}
.mlbl{font-size:11px;font-weight:600;color:var(--slate);display:block;margin:12px 0 3px}
.minp{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);font-size:13px;outline:none;box-sizing:border-box;font-family:'DM Sans',sans-serif}
.minp:focus{border-color:var(--teal)}
.mbtns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.btn-c{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:white;font-size:12px;font-weight:600;color:var(--slate);cursor:pointer}
.btn-p{padding:8px 20px;border-radius:8px;border:none;background:var(--teal);color:white;font-size:12px;font-weight:700;cursor:pointer}
.btn-d{padding:8px 20px;border-radius:8px;border:none;background:var(--red);color:white;font-size:12px;font-weight:700;cursor:pointer}

/* MISC */
.info-card{background:white;border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
.info-card h3{font-size:14px;font-weight:700;margin:0 0 8px}
.quick-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px;margin-bottom:14px}
.qi{background:white;border:1px solid var(--border);border-radius:10px;padding:12px}
.treason{display:inline-block;font-size:10px;padding:3px 8px;border-radius:6px;background:var(--teal-light);border:1px solid var(--teal-border);color:var(--teal-dark);font-weight:600;margin:2px}
.tl-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:3px 8px;border-radius:6px;background:var(--teal-light);border:1px solid var(--teal-border)}
.faq-item{border-radius:10px;border:1px solid var(--border);margin-bottom:5px;overflow:hidden}
.faq-btn{flex:1;width:100%;padding:10px 14px;display:flex;justify-content:space-between;background:white;border:none;font-size:12px;font-weight:600;color:#334155;text-align:left;cursor:pointer}
.faq-btn.open{background:var(--teal-light)}
.faq-body{padding:0 14px 10px;font-size:12px;color:var(--slate);display:none;line-height:1.5}
.faq-body.show{display:block}
.color-swatch{width:24px;height:24px;border-radius:7px;border:3px solid transparent;cursor:pointer}
.color-swatch.sel{border-color:#1e293b}
.onboard{max-width:420px;margin:80px auto;text-align:center;padding:40px 28px;background:white;border-radius:20px;border:1px solid var(--border);box-shadow:0 8px 40px rgba(13,148,136,.12)}
.footer{text-align:center;margin-top:16px;padding:10px;color:#94a3b8;font-size:10px;background:white;border-radius:10px;border:1px solid var(--border)}
</style>
</head>

  add(kids);return el;
}

// ---- EXPORT & PUBLISH (fetch+replace+download) ----
function exportPublish(){
  var msgEl=document.getElementById("export-pub-msg");
  if(msgEl){msgEl.textContent="⏳ Preparing...";msgEl.style.color="#6366f1";}
  fetch(location.href)
    .then(function(r){if(!r.ok)throw new Error("fetch failed");return r.text();})
    .then(function(html){
      html=html.replace(/var DP=\[[\s\S]*?\];/,"var DP="+JSON.stringify(S.phases)+";");
      html=html.replace(/var DT=\[[\s\S]*?\];/,"var DT="+JSON.stringify(S.tasks)+";");
      html=html.replace(/var FAQS=\[[\s\S]*?\];/,"var FAQS="+JSON.stringify(FAQS)+";");
      var blob=new Blob([html],{type:"text/html"});
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");a.href=url;a.download="index.html";a.click();
      URL.revokeObjectURL(url);
      if(msgEl){msgEl.textContent="✅ Downloaded! Upload index.html to publish.";msgEl.style.color="#10b981";}
      setTimeout(function(){if(msgEl)msgEl.textContent="";},6000);
    })
    .catch(function(){
      if(msgEl){msgEl.textContent="⚠️ Open from a hosted URL to use Export & Publish.";msgEl.style.color="#ef4444";}
      setTimeout(function(){if(msgEl)msgEl.textContent="";},5000);
    });
}

          var row=h("div",{className:"task-row"});
          var cb=h("div",{className:"cb"+(isDone?" on":""),onClick:function(){if(!isAdm&&(isHid||isAO))return;S.done[task.id]=!S.done[task.id];save();render();}});
          if(isDone)cb.innerHTML='<svg width="10" height="10" viewBox="0 0 14 14" fill="none"><path d="M2.5 7.5L5.5 10.5L11.5 3.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
          row.appendChild(cb);
          var content=h("div",{style:{flex:"1",minWidth:"0"}});

          // Task text — inline for admin
          if(isAdm){
            var txta=h("textarea",{className:"ie ie-task"+(isDone?" done-txt":""),rows:1});
            txta.value=task.text||"";setTimeout(function(ta){return function(){ar(ta);};}(txta),0);
            txta.addEventListener("input",function(){task.text=txta.value;ar(txta);});txta.addEventListener("blur",function(){save();});txta.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();txta.blur();}});
            content.appendChild(txta);
          } else {
            content.appendChild(h("span",{style:{fontSize:"12px",fontWeight:"500",lineHeight:"1.35",display:"block"}},task.text));
          }

          // Meta row
          var meta=h("div",{style:{display:"flex",gap:"5px",marginTop:"3px",flexWrap:"wrap",alignItems:"center"}});
          if(isAdm){
            var dw=h("span",{style:{display:"inline-flex",alignItems:"center",gap:"2px",fontSize:"9px",color:"var(--teal)",background:"var(--teal-light)",border:"1px solid var(--teal-border)",borderRadius:"4px",padding:"1px 4px"}});
            dw.appendChild(h("span",null,"📅 "));
            var sd=h("input",{type:"date",value:task.startDate||"",style:{border:"none",background:"transparent",fontSize:"9px",color:"var(--teal)",fontWeight:"600",outline:"none",width:"88px",cursor:"pointer"}});sd.addEventListener("change",function(){task.startDate=sd.value;save();});dw.appendChild(sd);
            dw.appendChild(h("span",null,"→"));
            var dd=h("input",{type:"date",value:task.dueDate||"",style:{border:"none",background:"transparent",fontSize:"9px",color:"var(--teal)",fontWeight:"600",outline:"none",width:"88px",cursor:"pointer"}});dd.addEventListener("change",function(){task.dueDate=dd.value;save();});dw.appendChild(dd);
            meta.appendChild(dw);
          } else if(task.startDate||task.dueDate){
            meta.appendChild(h("span",{style:{fontSize:"9px",color:"var(--teal)",background:"var(--teal-light)",border:"1px solid var(--teal-border)",borderRadius:"4px",padding:"1px 6px",fontWeight:"600"}},"📅 "+fmtD(task.startDate)+(task.dueDate?"→"+fmtD(task.dueDate):"")));
          }
          if(isAdm){
            var owI=h("input",{type:"text",value:task.owner||"",placeholder:"Owner",style:{fontSize:"9px",color:"#94a3b8",background:"transparent",border:"none",outline:"none",width:"80px",fontFamily:"'DM Sans',sans-serif"}});
            owI.addEventListener("input",function(){task.owner=owI.value;});owI.addEventListener("blur",function(){save();render();});owI.addEventListener("keydown",function(e){if(e.key==="Enter")owI.blur();});
            meta.appendChild(h("span",{style:{fontSize:"9px",color:"#94a3b8",display:"inline-flex",alignItems:"center",gap:"1px"}},"👤 ",owI));
          } else {meta.appendChild(h("span",{style:{fontSize:"9px",color:"#94a3b8"}},"👤 "+task.owner));}
          if(isAdm){
            var prS=h("select",{style:{fontSize:"9px",fontWeight:"700",background:"transparent",border:"none",outline:"none",cursor:"pointer",padding:"2px 4px",borderRadius:"999px",fontFamily:"'DM Sans',sans-serif",color:PC[task.priority]||"#94a3b8"}});
            [{v:"high",l:"🔴 High"},{v:"medium",l:"🟡 Medium"},{v:"low",l:"⚪ Low"}].forEach(function(opt){var o=h("option",{value:opt.v},opt.l);if(task.priority===opt.v)o.selected=true;prS.appendChild(o);});
            prS.addEventListener("change",function(){task.priority=prS.value;prS.style.color=PC[task.priority];save();});
            meta.appendChild(prS);
          } else {meta.appendChild(pill(PC[task.priority],task.priority));}
          if(isAdm){var vlv=vl(task);meta.appendChild(h("span",{className:"vbadge "+vlv.cls,title:"Click to cycle: Visible → Hidden → Admin Only",onClick:function(e){e.stopPropagation();cycleVis(task);}},vlv.txt));}
          content.appendChild(meta);

          // Resources
          var resRow=h("div",{style:{display:"flex",gap:"3px",flexWrap:"wrap",marginTop:"3px",alignItems:"center"}});
          if(task.resources)task.resources.forEach(function(r,ri){
            var hasUrl=r.url&&r.url.length>0;
            var tag=h("span",{className:"res-tag",style:{background:hasUrl?"var(--teal-light)":"#f1f5f9",color:hasUrl?"var(--teal)":"#94a3b8",border:hasUrl?"1px solid var(--teal-border)":"1px solid var(--border)"}},(RT[r.type]||"📄")+" ");
            if(hasUrl){var lnk=h("a",{href:r.url,target:"_blank",rel:"noopener",style:{color:"var(--teal)",textDecoration:"underline"}},r.label);(function(u){lnk.addEventListener("click",function(e){e.stopPropagation();e.preventDefault();window.open(u,"_blank");});})(r.url);tag.appendChild(lnk);}
            else if(isAdm){var rli=h("input",{type:"text",value:r.label||"",style:{fontSize:"9px",background:"transparent",border:"none",outline:"none",fontFamily:"'DM Sans',sans-serif",width:"75px",color:"#94a3b8"}});rli.addEventListener("input",function(){r.label=rli.value;});rli.addEventListener("blur",function(){save();});tag.appendChild(rli);}
            else tag.appendChild(document.createTextNode(r.label));
            if(isAdm){
              tag.appendChild(h("button",{style:{marginLeft:"2px",padding:"1px 4px",fontSize:"8px",border:"1px dashed var(--teal-border)",background:"var(--teal-light)",color:"var(--teal)",borderRadius:"3px",cursor:"pointer"},onClick:function(e){e.stopPropagation();showLinkEdit(r.url||"",r.label,function(url){r.url=url;save();render();});}},hasUrl?"✏️":"+ url"));
              tag.appendChild(h("button",{style:{padding:"1px 3px",border:"none",background:"none",color:"var(--red)",cursor:"pointer",fontSize:"8px"},onClick:function(e){e.stopPropagation();task.resources.splice(ri,1);save();render();}},"✕"));
            }
            resRow.appendChild(tag);
          });
          if(isAdm)resRow.appendChild(h("button",{className:"lbtn",style:{padding:"3px 8px",fontSize:"9px"},onClick:function(e){e.stopPropagation();showAddRes(task);}},"+ resource"));
          if((task.resources&&task.resources.length>0)||isAdm)content.appendChild(resRow);

          // Training links
          if(!task.trainingLinks)task.trainingLinks=[];
          var tlDiv=h("div",{style:{display:"flex",gap:"4px",flexWrap:"wrap",marginTop:"4px",alignItems:"center"}});
          task.trainingLinks.forEach(function(link,li){if(link.url&&link.url.length>0){var ltag=h("span",{className:"tl-tag"});var la=h("a",{href:link.url,target:"_blank",rel:"noopener",style:{color:"var(--teal)",textDecoration:"underline",fontWeight:"600"}},"🔗 "+(link.name||"Training Link"));(function(u){la.addEventListener("click",function(e){e.stopPropagation();e.preventDefault();window.open(u,"_blank");});})(link.url);ltag.appendChild(la);if(isAdm){ltag.appendChild(h("button",{style:{padding:"1px 4px",border:"none",background:"none",color:"#94a3b8",cursor:"pointer",fontSize:"9px"},onClick:function(e){e.stopPropagation();showTLEdit(task,li);}},"✏️"));ltag.appendChild(h("button",{style:{padding:"1px 4px",border:"none",background:"none",color:"var(--red)",cursor:"pointer",fontSize:"9px"},onClick:function(e){e.stopPropagation();task.trainingLinks.splice(li,1);save();render();}},"✕"));}tlDiv.appendChild(ltag);}});
          if(isAdm)tlDiv.appendChild(h("button",{className:"lbtn",style:{padding:"3px 8px",fontSize:"9px"},onClick:function(e){e.stopPropagation();showTLEdit(task,-1);}},"+ training link"));
          if(task.trainingLinks.length>0||isAdm)content.appendChild(tlDiv);

          // NOTES (toggle, same pattern as GL/ML plan)
          (function(){
            if(!S.notes)S.notes={};
            var noteText=S.notes[task.id]||"";
            var notesWrap=h("div",{className:"task-notes"});
            var expanded=!!noteText;
            var icon="📝";
            var toggleBtn=h("button",{className:"notes-toggle"+(noteText?" has-note":""),onClick:function(e){e.stopPropagation();expanded=!expanded;ta.style.display=expanded?"block":"none";if(expanded)setTimeout(function(){ta.focus();ta.selectionStart=ta.selectionEnd=ta.value.length;},60);}},noteText?icon+" Note":icon+" Add note");
            var ta=h("textarea",{className:"notes-area",placeholder:"Personal note for this task…",style:{display:expanded?"block":"none"}});
            ta.value=noteText;
            ta.addEventListener("input",function(){var val=ta.value;saveNote(task.id,val);toggleBtn.className="notes-toggle"+(val.trim()?" has-note":"");toggleBtn.textContent=val.trim()?icon+" Note":icon+" Add note";});
            ta.addEventListener("click",function(e){e.stopPropagation();});
            notesWrap.appendChild(toggleBtn);notesWrap.appendChild(ta);
            content.appendChild(notesWrap);
          })();

          row.appendChild(content);

          // Admin reorder/delete
          if(isAdm){
            row.appendChild(h("div",{className:"abtn-row"},
              h("button",{className:"abtn",style:{background:"#f8fafc",color:"#94a3b8"},onClick:function(){var pts=S.tasks.filter(function(x){return x.phaseId===task.phaseId;});var i=pts.indexOf(task);if(i>0){var gi=S.tasks.indexOf(task);var pi=S.tasks.indexOf(pts[i-1]);var tmp=S.tasks[gi];S.tasks[gi]=S.tasks[pi];S.tasks[pi]=tmp;save();render();}}},"↑"),
              h("button",{className:"abtn",style:{background:"#f8fafc",color:"#94a3b8"},onClick:function(){var pts=S.tasks.filter(function(x){return x.phaseId===task.phaseId;});var i=pts.indexOf(task);if(i<pts.length-1){var gi=S.tasks.indexOf(task);var ni=S.tasks.indexOf(pts[i+1]);var tmp=S.tasks[gi];S.tasks[gi]=S.tasks[ni];S.tasks[ni]=tmp;save();render();}}},"↓"),
              h("button",{className:"abtn",style:{background:"#fef2f2",color:"var(--red)"},onClick:function(){showConfirm("task",task.id);}},"🗑")
            ));
          }
          taskEl.appendChild(row);body.appendChild(taskEl);
        });

        // Add Task — available to everyone, admin gets full modal, users get quick-add inline
        if(isAdm){
          body.appendChild(h("button",{style:{marginTop:"6px",padding:"7px",borderRadius:"8px",border:"1px dashed var(--teal-border)",background:"var(--teal-light)",color:"var(--teal)",fontSize:"11px",fontWeight:"700",width:"100%",cursor:"pointer"},onClick:function(){showAddTask(ph.id);}},"+ Add Task"));
        } else {
          // Quick-add inline for regular users
          var qaWrap=h("div",{style:{marginTop:"6px"}});
          var qaOpen=false;
          var qaToggle=h("button",{style:{padding:"6px 12px",borderRadius:"8px",border:"1px dashed var(--teal-border)",background:"var(--teal-light)",color:"var(--teal)",fontSize:"11px",fontWeight:"700",width:"100%",cursor:"pointer"}},"\uFF0B Add a task to this phase");
          var qaForm=h("div",{style:{display:"none",marginTop:"6px",background:"#f8fafc",border:"1px solid var(--teal-border)",borderRadius:"10px",padding:"12px"}});
          var qaTxt=h("textarea",{placeholder:"Describe the task...",rows:2,style:{width:"100%",padding:"8px 10px",borderRadius:"8px",border:"1px solid var(--border)",fontSize:"12px",resize:"vertical",outline:"none",boxSizing:"border-box",fontFamily:"'DM Sans',sans-serif"}});
          qaTxt.addEventListener("focus",function(){qaTxt.style.borderColor="var(--teal)";});qaTxt.addEventListener("blur",function(){qaTxt.style.borderColor="var(--border)";});
          var qaOwner=h("input",{type:"text",value:S.userName,placeholder:"Your name",style:{width:"100%",padding:"7px 10px",borderRadius:"8px",border:"1px solid var(--border)",fontSize:"12px",outline:"none",boxSizing:"border-box",marginTop:"6px",fontFamily:"'DM Sans',sans-serif"}});
          qaOwner.addEventListener("focus",function(){qaOwner.style.borderColor="var(--teal)";});qaOwner.addEventListener("blur",function(){qaOwner.style.borderColor="var(--border)";});
          var qaErr=h("p",{style:{fontSize:"11px",color:"#dc2626",margin:"4px 0 0",display:"none"}},"Please enter a task description.");
          var qaBtns=h("div",{style:{display:"flex",gap:"6px",marginTop:"8px"}},
            h("button",{style:{flex:"1",padding:"7px",borderRadius:"8px",border:"1px solid var(--border)",background:"white",fontSize:"11px",fontWeight:"600",color:"var(--slate)",cursor:"pointer"},onClick:function(){qaForm.style.display="none";qaToggle.style.display="block";qaTxt.value="";qaOwner.value=S.userName;qaErr.style.display="none";}},"Cancel"),
            h("button",{style:{flex:"1",padding:"7px",borderRadius:"8px",border:"none",background:"var(--teal)",color:"white",fontSize:"11px",fontWeight:"700",cursor:"pointer"},onClick:function(){
              var txt=qaTxt.value.trim();if(!txt){qaErr.style.display="block";qaTxt.focus();return;}
              qaErr.style.display="none";
              S.tasks.push({id:uid(),phaseId:ph.id,text:txt,owner:qaOwner.value.trim()||S.userName,priority:"medium",startDate:"",dueDate:"",resources:[],trainingLinks:[],visible:true,adminOnly:false});
              save();qaForm.style.display="none";qaToggle.style.display="block";qaTxt.value="";qaErr.style.display="none";render();
            }},"Add Task")
          );
          qaForm.appendChild(h("p",{style:{fontSize:"11px",fontWeight:"700",color:"var(--teal-dark)",margin:"0 0 6px"}},"✚ New task for: "+ph.icon+" "+ph.name));
          qaForm.appendChild(qaTxt);qaForm.appendChild(qaOwner);qaForm.appendChild(qaErr);qaForm.appendChild(qaBtns);
          qaToggle.addEventListener("click",function(){qaForm.style.display="block";qaToggle.style.display="none";setTimeout(function(){qaTxt.focus();},60);});
          qaWrap.appendChild(qaToggle);qaWrap.appendChild(qaForm);
          body.appendChild(qaWrap);
        }
        phEl.appendChild(body);
      }
      app.appendChild(phEl);
    });
  }

  app.appendChild(h("div",{className:"footer"},pct===100?"🎉 Rotation complete! Great work, "+S.userName+"!":pct+"% · 💾 Auto-saves · "+(isAdm?"✏️ Click any field to edit":"🔒 Admin PIN to edit")+" · 📤 Export All Links always available"));
}

load();loadFaqs();render();
</script>
</body>
</html>
